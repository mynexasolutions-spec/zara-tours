<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zara Tour-N-Travels | हर सफर एक नई कहानी</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180"
    href="{{ url_for('static', filename='images/favicons/apple-touch-icon.png') }}">
  <link rel="icon" type="image/png" sizes="32x32"
    href="{{ url_for('static', filename='images/favicons/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16"
    href="{{ url_for('static', filename='images/favicons/favicon-16x16.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='images/favicons/site.webmanifest') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicons/favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>


  {% include 'components/navbar.html' %}

  {% block content %}{% endblock %}

  {% include 'components/footer.html' %}

  {% block scripts %}
  <script>
    // ================= NAVBAR SCROLL =================
    const navbar = document.getElementById("navbar");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 60) {
        navbar.classList.add("scrolled");
      } else {
        navbar.classList.remove("scrolled");
      }
    });

    // ================= MOBILE MENU =================
    const mobileMenu = document.getElementById("mobileMenu");
    const hamburger = document.getElementById("hamburger");
    const closeBtn = document.querySelector(".mobile-close");

    // OPEN MENU
    function openMenu() {
      mobileMenu.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    // CLOSE MENU
    function closeMenu() {
      mobileMenu.classList.remove("open");
      document.body.style.overflow = "";
    }

    // EVENTS
    hamburger.addEventListener("click", openMenu);
    closeBtn.addEventListener("click", closeMenu);

    // CLOSE ON OUTSIDE CLICK
    mobileMenu.addEventListener("click", (e) => {
      if (e.target === mobileMenu) {
        closeMenu();
      }
    });

    // CLOSE ON ESC KEY
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeMenu();
      }
    });
    
    // Scroll reveal
    const revealEls = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    revealEls.forEach(el => observer.observe(el));

    // Form submit
    function handleSubmit(btn) {
      btn.textContent = 'Enquiry Sent — We\'ll Call You Soon';
      btn.style.background = 'var(--mint)';
      setTimeout(() => { btn.textContent = 'Send Enquiry'; btn.style.background = ''; }, 4000);
    }

    // Hero slider
    const heroSlides = document.querySelectorAll('.hero-slide');
    if (heroSlides.length > 0) {
      let current = 0;
      setInterval(() => {
        heroSlides[current].classList.remove('active');
        current = (current + 1) % heroSlides.length;
        heroSlides[current].classList.add('active');
      }, 4500);
    }


  </script>


  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  {% endblock %}
</body>

</html>
